spring:
  application:
    name: onetyone

  datasource:
    url: jdbc:postgresql://localhost:5432/onetyone_db
    username: onetyone_user
    password: onetyone_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # auto-creates/updates tables from your entities
    show-sql: true            # logs every SQL query in console
    properties:
      hibernate:
        format_sql: true      # makes the logged SQL readable
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwt:
  secret: your-256-bit-secret-key-replace-this-in-production
  expiration: 86400000        # 24 hours in milliseconds

